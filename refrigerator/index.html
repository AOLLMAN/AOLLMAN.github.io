<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#97e7d3" />
    <title>냉장고 재고 관리 앱</title>
    <style>
      :root {
        --mint: #97e7d3;
        --mint-deep: #54c9b3;
        --blue: #4f95ee;
        --blue-soft: #a8cef7;
        --orange: #f7b863;
        --red: #f26452;
        --ink: #111827;
        --muted: #6b7280;
        --line: rgba(17, 24, 39, 0.08);
        --card-shadow: 0 18px 32px rgba(30, 41, 59, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        font-family: "SF Pro Display", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 22%, rgba(255, 255, 255, 0.84), transparent 20%),
          radial-gradient(circle at 84% 28%, rgba(255, 236, 205, 0.8), transparent 16%),
          radial-gradient(circle at 80% 80%, rgba(255, 224, 170, 0.55), transparent 14%),
          linear-gradient(135deg, #f1ede5 0%, #efe2d3 42%, #f8f4ed 100%);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 999px;
        filter: blur(12px);
        pointer-events: none;
      }

      body::before {
        width: 240px;
        height: 240px;
        left: 8vw;
        bottom: 8vh;
        background: rgba(171, 234, 198, 0.4);
      }

      body::after {
        width: 180px;
        height: 180px;
        right: 8vw;
        bottom: 12vh;
        background: rgba(255, 212, 150, 0.45);
      }

      .phone {
        position: relative;
        width: min(100%, 430px);
        height: min(92vh, 860px);
        padding: 10px;
        border-radius: 44px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.04)),
          linear-gradient(180deg, #12161d, #07090d);
        box-shadow: 0 26px 60px rgba(0, 0, 0, 0.28);
      }

      .phone::before {
        content: "";
        position: absolute;
        top: 16px;
        left: 50%;
        width: 124px;
        height: 30px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.86);
        z-index: 5;
      }

      .screen {
        position: relative;
        height: 100%;
        overflow: hidden;
        border-radius: 36px;
        background: linear-gradient(180deg, #a8efde 0%, #8be2cb 18%, #f5f8fc 18.5%, #f5f8fc 100%);
      }

      .status-bar,
      .hero {
        position: relative;
        z-index: 2;
      }

      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 18px 24px 8px;
        font-weight: 800;
      }

      .status-icons {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .signal {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 13px;
      }

      .signal span {
        width: 3px;
        border-radius: 999px;
        background: #15202f;
      }

      .signal span:nth-child(1) { height: 5px; opacity: .4; }
      .signal span:nth-child(2) { height: 7px; opacity: .55; }
      .signal span:nth-child(3) { height: 10px; opacity: .7; }
      .signal span:nth-child(4) { height: 13px; }

      .wifi,
      .battery {
        position: relative;
      }

      .wifi {
        width: 16px;
        height: 12px;
        border: 2px solid transparent;
        border-top-color: #15202f;
        border-radius: 50%;
      }

      .wifi::before,
      .wifi::after,
      .battery::before,
      .battery::after {
        content: "";
        position: absolute;
      }

      .wifi::before {
        top: -4px;
        left: 50%;
        width: 16px;
        height: 10px;
        transform: translateX(-50%);
        border: 2px solid transparent;
        border-top-color: #15202f;
        border-radius: 50%;
      }

      .wifi::after {
        left: 50%;
        bottom: -2px;
        width: 4px;
        height: 4px;
        transform: translateX(-50%);
        border-radius: 50%;
        background: #15202f;
      }

      .battery {
        width: 24px;
        height: 12px;
        border: 2px solid #15202f;
        border-radius: 4px;
      }

      .battery::before {
        top: 2px;
        left: 2px;
        width: 14px;
        height: 4px;
        border-radius: 2px;
        background: #15202f;
      }

      .battery::after {
        top: 2px;
        right: -4px;
        width: 2px;
        height: 6px;
        border-radius: 0 2px 2px 0;
        background: #15202f;
      }

      .hero {
        padding: 4px 20px 22px;
      }

      .hero-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
      }

      .icon-btn {
        width: 40px;
        height: 40px;
        padding: 0;
        border: 0;
        border-radius: 999px;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.42);
        color: #20354a;
        backdrop-filter: blur(14px);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 8px 16px 10px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.28);
        backdrop-filter: blur(14px);
      }

      .brand-icon {
        font-size: 1.8rem;
        line-height: 1;
      }

      .brand-title {
        font-size: clamp(1.7rem, 3.7vw, 1.95rem);
        font-weight: 900;
        letter-spacing: -0.06em;
        line-height: 1;
        color: #ffc93a;
        text-shadow: 0 3px 0 #24324d, 2px 0 0 #24324d, -2px 0 0 #24324d, 0 -2px 0 #24324d;
      }

      .sheet {
        position: relative;
        z-index: 2;
        height: calc(100% - 126px);
        margin-top: -4px;
        padding: 26px 18px 118px;
        border-top-left-radius: 32px;
        border-top-right-radius: 32px;
        overflow-y: auto;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(247, 250, 255, 0.98));
      }

      .sheet::-webkit-scrollbar {
        width: 0;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      .section-note,
      .stock-date,
      .stock-meta,
      .recipe-meta,
      .stock-empty {
        color: var(--muted);
      }

      .storage-tabs {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 18px;
        padding: 6px;
        border-radius: 22px;
        background: linear-gradient(180deg, #edf5ff, #e7f1ff);
        border: 1px solid rgba(79, 149, 238, 0.14);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .storage-tabs[hidden] {
        display: none;
      }

      .storage-tab {
        min-height: 46px;
        padding: 0 10px;
        border: 0;
        border-radius: 16px;
        background: transparent;
        color: #5b6b82;
        font-size: .95rem;
        font-weight: 900;
        letter-spacing: -0.03em;
        transition: background .18s ease, color .18s ease, box-shadow .18s ease, transform .18s ease;
      }

      .storage-tab.active {
        color: #fff;
        background: linear-gradient(180deg, #63afff, #347fe6);
        box-shadow: 0 10px 20px rgba(52, 127, 230, 0.22);
      }

      .storage-tab:active {
        transform: translateY(1px);
      }

      .stock-grid,
      .recipe-grid {
        display: grid;
        gap: 12px;
      }

      .stock-grid {
        margin-top: 16px;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .recipe-grid {
        margin-top: 14px;
        grid-template-columns: minmax(0, 1fr);
        gap: 14px;
      }

      .card {
        background: linear-gradient(180deg, #fff, #fbfdff);
        border: 1px solid var(--line);
        box-shadow: var(--card-shadow);
      }

      .stock-card {
        padding: 12px 10px 10px;
        border-radius: 22px;
        text-align: center;
        animation: rise .55s ease both;
      }

      .stock-card:nth-child(2) { animation-delay: .06s; }
      .stock-card:nth-child(3) { animation-delay: .12s; }

      .stock-visual {
        display: grid;
        place-items: center;
        height: 96px;
        padding: 10px;
        border-radius: 18px;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.66);
      }

      .stock-visual svg {
        width: 74px;
        height: 74px;
        display: block;
      }

      .stock-location {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(79, 149, 238, 0.12);
        color: var(--blue);
        font-size: .78rem;
        font-weight: 900;
        letter-spacing: -0.02em;
      }

      .stock-name {
        margin-top: 10px;
        font-size: 1.15rem;
        font-weight: 900;
        letter-spacing: -0.05em;
      }

      .stock-meta {
        margin-top: 2px;
        font-size: .97rem;
        font-weight: 700;
      }

      .stock-date {
        margin-top: 10px;
        font-size: .92rem;
        font-weight: 700;
      }

      .stock-badge {
        margin-top: 10px;
        height: 31px;
        border-radius: 999px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        color: #fff;
        font-size: .86rem;
        font-weight: 900;
        background: linear-gradient(180deg, #ff7b5f, var(--red));
      }

      .badge-dot {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: rgba(255, 255, 255, 0.2);
        font-size: .74rem;
      }

      .stock-empty {
        grid-column: 1 / -1;
        padding: 28px 18px;
        border-radius: 24px;
        text-align: center;
        font-size: .98rem;
        font-weight: 800;
      }

      .section-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        gap: 14px;
        margin-top: 28px;
      }

      .section-heading {
        display: grid;
        gap: 4px;
      }

      .section-row h2 {
        font-size: 1.55rem;
        letter-spacing: -0.05em;
      }

      .section-note {
        font-size: .95rem;
        font-weight: 700;
      }

      .section-action {
        flex-shrink: 0;
        min-height: 40px;
        padding: 0 14px;
        border: 0;
        border-radius: 999px;
        background: rgba(79, 149, 238, 0.12);
        color: var(--blue);
        font-size: .86rem;
        font-weight: 900;
      }

      .recipe-card {
        padding: 12px;
        border-radius: 24px;
        animation: rise .6s ease both;
      }

      .recipe-card:nth-child(2) { animation-delay: .08s; }

      .recipe-card-button {
        width: 100%;
        border: 1px solid var(--line);
        text-align: left;
        cursor: pointer;
      }

      .recipe-card-button:focus-visible {
        outline: 3px solid rgba(79, 149, 238, 0.24);
        outline-offset: 3px;
      }

      .recipe-art {
        position: relative;
        height: 146px;
        overflow: hidden;
        border-radius: 18px;
        padding: 12px;
      }

      .recipe-art::before,
      .recipe-art::after {
        content: "";
        position: absolute;
        border-radius: 999px;
      }

      .recipe-art::before {
        width: 150px;
        height: 150px;
        left: 50%;
        top: 56%;
        transform: translate(-50%, -50%);
        background: rgba(255, 255, 255, 0.8);
      }

      .recipe-art::after {
        inset: auto 12px 12px auto;
        width: 64px;
        height: 64px;
        background: rgba(255, 255, 255, 0.18);
        filter: blur(10px);
      }

      .art-rice { background: linear-gradient(135deg, #f6d7b0, #fce8d4); }
      .art-roll { background: linear-gradient(135deg, #e6d2b8, #f3e4d6); }
      .art-tofu { background: linear-gradient(135deg, #efe6d7, #faf4ea); }
      .art-stew { background: linear-gradient(135deg, #ffcfba, #ffe7dc); }
      .art-veggie { background: linear-gradient(135deg, #d8f3cc, #eef8de); }

      .recipe-plate {
        position: absolute;
        left: 50%;
        top: 52%;
        transform: translate(-50%, -50%);
        font-size: 4.4rem;
        z-index: 1;
      }

      .recipe-accent {
        position: absolute;
        z-index: 2;
        font-size: 1.5rem;
      }

      .recipe-accent.a { top: 18px; left: 16px; }
      .recipe-accent.b { right: 14px; top: 20px; }
      .recipe-accent.c { left: 22px; bottom: 18px; }

      .time-pill {
        position: absolute;
        right: 10px;
        bottom: 10px;
        z-index: 3;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(64, 46, 24, 0.56);
        color: #fff;
        font-size: .8rem;
        font-weight: 800;
      }

      .recipe-card-body {
        padding: 4px 2px 2px;
      }

      .recipe-title-row {
        margin-top: 10px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .recipe-title {
        font-size: 1.2rem;
        font-weight: 900;
        letter-spacing: -0.05em;
      }

      .recipe-mini-meta {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 6px;
      }

      .recipe-mini-pill {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        background: rgba(79, 149, 238, 0.1);
        color: var(--blue);
        font-size: .78rem;
        font-weight: 900;
      }

      .recipe-reason {
        margin-top: 10px;
        font-size: .96rem;
        line-height: 1.55;
        color: #334155;
        font-weight: 700;
      }

      .recipe-group {
        margin-top: 12px;
      }

      .recipe-group-label {
        display: block;
        font-size: .82rem;
        font-weight: 900;
        color: #64748b;
      }

      .recipe-chip-wrap,
      .detail-chip-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 8px;
      }

      .recipe-chip {
        display: inline-flex;
        align-items: center;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: .8rem;
        font-weight: 800;
      }

      .recipe-chip.available {
        background: rgba(151, 231, 211, 0.34);
        color: #0f766e;
      }

      .recipe-chip.missing {
        background: rgba(242, 100, 82, 0.12);
        color: #b42318;
      }

      .recipe-chip.neutral {
        background: rgba(79, 149, 238, 0.12);
        color: var(--blue);
      }

      .recipe-meta {
        margin-top: 10px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        font-size: .95rem;
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .recipe-feedback {
        padding: 24px 20px;
        border-radius: 24px;
        display: grid;
        gap: 10px;
      }

      .recipe-feedback.is-loading {
        place-items: center;
        text-align: center;
      }

      .feedback-title {
        font-size: 1.08rem;
        font-weight: 900;
        letter-spacing: -0.04em;
      }

      .feedback-copy {
        line-height: 1.55;
        color: var(--muted);
        font-weight: 700;
      }

      .feedback-action {
        width: fit-content;
        min-height: 40px;
        padding: 0 16px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(180deg, #63afff, #347fe6);
        color: #fff;
        font-size: .86rem;
        font-weight: 900;
      }

      .loading-dots {
        display: inline-flex;
        gap: 6px;
      }

      .loading-dots span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(52, 127, 230, 0.78);
        animation: pulseDot 1s ease-in-out infinite;
      }

      .loading-dots span:nth-child(2) { animation-delay: .15s; }
      .loading-dots span:nth-child(3) { animation-delay: .3s; }

      .fab {
        position: absolute;
        right: 22px;
        bottom: 86px;
        z-index: 4;
        width: 68px;
        height: 68px;
        padding: 0;
        border: 0;
        border-radius: 50%;
        color: #fff;
        font-size: 2.6rem;
        background: linear-gradient(180deg, #63afff, #347fe6);
        box-shadow: 0 18px 34px rgba(52, 127, 230, 0.42);
      }

      .tabbar {
        position: absolute;
        inset: auto 0 0;
        z-index: 3;
        height: 92px;
        padding: 8px 16px 22px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 -12px 28px rgba(27, 39, 64, 0.1);
        backdrop-filter: blur(16px);
      }

      .tab {
        position: relative;
        padding: 0;
        border: 0;
        background: none;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 6px;
        color: #8b95a3;
        font-size: .84rem;
        font-weight: 900;
      }

      .tab svg {
        width: 24px;
        height: 24px;
      }

      .tab.active {
        color: var(--blue);
      }

      .tab.active::before {
        content: "";
        position: absolute;
        top: -8px;
        width: 36px;
        height: 4px;
        border-radius: 999px;
        background: var(--blue);
      }

      .home-indicator {
        position: absolute;
        left: 50%;
        bottom: 7px;
        width: 138px;
        height: 5px;
        border-radius: 999px;
        transform: translateX(-50%);
        background: rgba(16, 24, 40, 0.9);
      }

      .quick-sheet,
      .recipe-detail-sheet {
        position: absolute;
        inset: 0;
        z-index: 6;
        opacity: 0;
        pointer-events: none;
        transition: opacity .18s ease;
      }

      .recipe-detail-sheet {
        z-index: 7;
      }

      .quick-sheet.open,
      .recipe-detail-sheet.open {
        opacity: 1;
        pointer-events: auto;
      }

      .quick-sheet .backdrop,
      .recipe-detail-sheet .backdrop {
        position: absolute;
        inset: 0;
        background: rgba(15, 23, 42, 0.26);
        backdrop-filter: blur(6px);
      }

      .sheet-panel,
      .detail-panel {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        border-top-left-radius: 28px;
        border-top-right-radius: 28px;
        background: rgba(255, 255, 255, 0.98);
        transform: translateY(100%);
        transition: transform .24s ease;
      }

      .sheet-panel {
        padding: 14px 18px 28px;
      }

      .detail-panel {
        padding: 14px 18px 24px;
        max-height: min(78vh, 700px);
        overflow: hidden;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.99), rgba(246, 249, 255, 0.99));
      }

      .quick-sheet.open .sheet-panel,
      .recipe-detail-sheet.open .detail-panel {
        transform: translateY(0);
      }

      .sheet-handle {
        width: 48px;
        height: 5px;
        margin: 0 auto 14px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.66);
      }

      .sheet-title {
        font-size: 1.4rem;
        letter-spacing: -0.04em;
      }

      .sheet-copy {
        margin-top: 6px;
        font-size: .95rem;
        color: var(--muted);
        font-weight: 700;
      }

      .detail-topbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
      }

      .detail-close {
        flex-shrink: 0;
        min-height: 40px;
        padding: 0 14px;
        border: 0;
        border-radius: 999px;
        background: rgba(79, 149, 238, 0.12);
        color: var(--blue);
        font-size: .86rem;
        font-weight: 900;
      }

      .detail-body {
        margin-top: 14px;
        max-height: calc(78vh - 126px);
        overflow-y: auto;
        display: grid;
        gap: 14px;
        padding-right: 2px;
      }

      .detail-body::-webkit-scrollbar {
        width: 0;
      }

      .detail-section {
        padding: 16px;
        border-radius: 22px;
        background: linear-gradient(180deg, #fcfdff, #f6faff);
        border: 1px solid rgba(79, 149, 238, 0.08);
        box-shadow: 0 14px 24px rgba(30, 41, 59, 0.06);
      }

      .detail-section h3 {
        font-size: 1rem;
        letter-spacing: -0.03em;
      }

      .detail-copy {
        margin-top: 8px;
        line-height: 1.6;
        color: #334155;
        font-weight: 700;
      }

      .detail-meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
      }

      .detail-meta-pill {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        background: rgba(79, 149, 238, 0.12);
        color: var(--blue);
        font-size: .82rem;
        font-weight: 900;
      }

      .detail-step-list {
        margin: 10px 0 0;
        padding-left: 22px;
        display: grid;
        gap: 12px;
      }

      .detail-step-list li {
        padding: 14px 16px;
        border-radius: 18px;
        background: rgba(79, 149, 238, 0.08);
        color: var(--ink);
        font-weight: 700;
        line-height: 1.6;
      }

      .actions {
        margin-top: 16px;
        display: grid;
        gap: 12px;

              <path d="M36 42l8.4 3.3M31.8 49l7.3 2.9M28 55l6.2 2.5" stroke="#FFBC6E" stroke-width="3" stroke-linecap="round"></path>
              <path d="M54 23c.4-5.2 3.5-10.5 7.8-13.7M49 21c-2.6-4.3-7.1-7.5-11.8-8.9M58.5 26c4.4-2.7 9.9-3.4 14.5-2.1" stroke="#5FAF5F" stroke-width="4" stroke-linecap="round"></path>
            </svg>

        if (type === "kimchi") {

            <svg viewBox="0 0 88 88" fill="none" aria-hidden="true">
              <path d="M21 45c0-2.8 2.2-5 5-5h36c2.8 0 5 2.2 5 5 0 10.5-7.6 18.2-23 18.2S21 55.5 21 45Z" fill="#F7F2EA" stroke="#7A5E48" stroke-width="3"></path>
              <path d="M28 39c2.1-9.2 7.6-15.2 16-15.2S57.9 29.8 60 39" stroke="#7A5E48" stroke-width="3" stroke-linecap="round"></path>
              <path d="M29 42c3.6-5.5 8.9-8.8 15-8.8 6.8 0 12.1 3.1 16 9.2-2.6 7.3-8.5 12.2-16 12.2-7.1 0-12.4-3.4-15-12.6Z" fill="#DF5A42" stroke="#8F2E24" stroke-width="3"></path>
              <path d="M34 42.5c2.2-3.1 5.4-5 9-5 3.5 0 6.8 1.7 9.6 5" stroke="#FFC281" stroke-width="3" stroke-linecap="round"></path>
              <path d="M38.5 49c1.6 1.3 3.5 2 5.7 2 2.3 0 4.4-.8 6.1-2.3" stroke="#FFC281" stroke-width="3" stroke-linecap="round"></path>
            </svg>
          `;
        }

        if (type === "tofu") {
          return `
            <svg viewBox="0 0 88 88" fill="none" aria-hidden="true">
              <rect x="20" y="29" width="48" height="32" rx="8" fill="#FFFDF8" stroke="#7B8794" stroke-width="3"></rect>
              <rect x="28" y="23" width="32" height="9" rx="4.5" fill="#E9EEF4" stroke="#7B8794" stroke-width="3"></rect>
              <path d="M28 43h32M28 51h24" stroke="#D8DEE6" stroke-width="3" stroke-linecap="round"></path>
              <circle cx="57" cy="45" r="3" fill="#7CC66E"></circle>
              <path d="M57 38c4.5-1.3 8.7-4.2 11.4-7.9" stroke="#7CC66E" stroke-width="3" stroke-linecap="round"></path>
            </svg>
          `;
        }

        if (type === "cheese") {
          return `
            <svg viewBox="0 0 88 88" fill="none" aria-hidden="true">
              <path d="M24 56V33.5c0-1.8 1.3-3.3 3.1-3.5l29.2-4.7c2.2-.4 4.3 1 4.9 3.2L66 48.8c.7 2.6-.9 5.3-3.5 5.9l-33.8 8.5c-2.4.6-4.7-1.2-4.7-3.6Z" fill="#FFD960" stroke="#A86F13" stroke-width="3" stroke-linejoin="round"></path>
              <circle cx="39" cy="41" r="4.2" fill="#FFC72B"></circle>
              <circle cx="52.5" cy="47" r="3.3" fill="#FFC72B"></circle>
              <circle cx="36" cy="55" r="2.8" fill="#FFC72B"></circle>
              <path d="M24 56 66 48.8" stroke="#A86F13" stroke-width="3"></path>
            </svg>
          `;
        }

        if (type === "green-onion") {
          return `
            <svg viewBox="0 0 88 88" fill="none" aria-hidden="true">
              <path d="M29 55c5.4-9.5 10.7-20.1 15.3-31.5M38 58c4.8-10 9.1-19.8 12.5-29.2M47 61c4.5-10.7 7.7-19.2 10.2-27.1" stroke="#49A85B" stroke-width="6" stroke-linecap="round"></path>
              <path d="M25 58c2.2-3.4 5.9-5.4 9.5-5.4 3.6 0 6.6 1.9 8.4 5.4" stroke="#DCECCF" stroke-width="5" stroke-linecap="round"></path>
              <path d="M34 62c1.9-3.2 4.7-5 7.9-5 3.3 0 6.1 1.8 8 5" stroke="#EEF7E7" stroke-width="5" stroke-linecap="round"></path>
              <path d="M44 65c1.7-3 4-4.7 7-4.7 2.7 0 5.1 1.4 6.9 4.2" stroke="#F7FCF4" stroke-width="5" stroke-linecap="round"></path>
              <path d="M26 59c8.7 5.2 18.3 6.8 29.5 4.9" stroke="#A9D4A3" stroke-width="4" stroke-linecap="round"></path>
            </svg>
          `;
        }

        return `
          <svg viewBox="0 0 88 88" fill="none" aria-hidden="true">
            <circle cx="44" cy="44" r="20" fill="#ffffff" stroke="#94A3B8" stroke-width="3"></circle>
            <path d="M34 44h20M44 34v20" stroke="#94A3B8" stroke-width="3" stroke-linecap="round"></path>
          </svg>
        `;
      }

      function renderStocks() {
        const visibleStocks = activeTab === "stock"
          ? stocks.filter((item) => item.storage === activeStorage)
          : stocks;

        stockGrid.setAttribute(
          "aria-label",
          activeTab === "stock" ? `${storageLabels[activeStorage]} 재고` : "유통기한 임박 재고"
        );

        stockGrid.innerHTML = visibleStocks.length
          ? visibleStocks.map((item) => `
            <article class="card stock-card">
              <div class="stock-location">${storageLabels[item.storage]}</div>
              <div class="stock-visual" style="background:${item.bg}">${renderStockArt(item.type)}</div>
              <div class="stock-name">${item.name}</div>
              <div class="stock-meta">${item.meta}</div>
              <div class="stock-date">${item.date}</div>
              <div class="stock-badge"><span>${item.badge}</span><span class="badge-dot">!</span></div>
            </article>
          `).join("")
          : `<div class="card stock-empty">${storageLabels[activeStorage]}에 등록된 품목이 없습니다.</div>`;
      }

      function getDaysLeft(item) {
        const matchedDays = item.badge.match(/(\d+)/);
        return matchedDays ? Number(matchedDays[1]) : 99;
      }

      function wait(ms) {
        return new Promise((resolve) => {
          setTimeout(resolve, ms);
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function renderIngredientChips(items, tone, emptyLabel) {
        if (!items.length) {
          return `<span class="recipe-chip neutral">${escapeHtml(emptyLabel)}</span>`;
        }

        return items.map((item) => (
          `<span class="recipe-chip ${tone}">${escapeHtml(item)}</span>`
        )).join("");
      }

      function renderFeedbackCard({ title, copy, actionLabel = "", action = "", loading = false }) {
        return `
          <article class="card recipe-feedback${loading ? " is-loading" : ""}">
            ${loading ? '<div class="loading-dots" aria-hidden="true"><span></span><span></span><span></span></div>' : ""}
            <strong class="feedback-title">${escapeHtml(title)}</strong>
            <p class="feedback-copy">${escapeHtml(copy)}</p>
            ${action ? `<button class="feedback-action" type="button" data-recipe-action="${escapeHtml(action)}">${escapeHtml(actionLabel)}</button>` : ""}
          </article>
        `;
      }

      function createInventoryContext(items) {
        const byName = new Map(items.map((item) => [item.name, item]));

        return {
          items,
          byName,
          names: new Set(byName.keys())
        };
      }

      function buildRecommendation(template, context) {
        const availableRequired = template.required.filter((name) => context.names.has(name));
        const availableOptional = (template.optional || []).filter((name) => context.names.has(name));
        const availableIngredients = [...availableRequired, ...availableOptional];
        const minimumRequiredMatches = Math.min(template.required.length, 2);

        if (availableRequired.length < minimumRequiredMatches || availableIngredients.length < 2) {
          return null;
        }

        const missingIngredients = [
          ...template.required.filter((name) => !context.names.has(name)),
          ...(template.pantry || []).filter((name) => !context.names.has(name))
        ];

        const urgentStocks = availableIngredients
          .map((name) => context.byName.get(name))
          .filter((item) => item && getDaysLeft(item) <= 4)
          .sort((left, right) => getDaysLeft(left) - getDaysLeft(right));

        const urgentNames = urgentStocks.map((item) => item.name);
        const reason = urgentNames.length
          ? `${urgentNames.join(", ")}를 먼저 쓰면서 한 끼 메뉴로 만들기 좋아요.`
          : "지금 있는 재료 조합으로 부담 없이 만들 수 있는 메뉴예요.";
        const useSoonMessage = urgentStocks.length
          ? `${urgentStocks.map((item) => `${item.name}(${item.badge})`).join(", ")} 재료를 이 메뉴에 넣어 먼저 소진합니다.`
          : "현재 재고를 한 번에 정리하기 좋은 메뉴예요.";
        const score = (availableIngredients.length * 6)
          + urgentStocks.reduce((total, item) => total + Math.max(0, 7 - getDaysLeft(item)), 0)
          - (missingIngredients.length * 2);

        return {
          id: template.id,
          title: template.title,
          reason,
          availableIngredients,
          missingIngredients,
          useSoonIngredients: urgentNames,
          useSoonMessage,
          time: template.time,
          difficulty: template.difficulty,
          art: template.art,
          plate: template.plate,
          accents: template.accents,
          score
        };
      }

      function generateRecommendations(items) {
        if (!Array.isArray(items)) {
          throw new Error("재고 데이터 형식이 올바르지 않습니다.");
        }

        if (!items.length) {
          return [];
        }

        const context = createInventoryContext(items);

        return recipeTemplates
          .map((template) => buildRecommendation(template, context))
          .filter(Boolean)
          .sort((left, right) => right.score - left.score)
          .slice(0, 4);
      }

      function renderRecommendationCards(items) {
        return items.map((item) => `
          <button class="card recipe-card recipe-card-button" type="button" data-recipe-id="${escapeHtml(item.id)}" aria-label="${escapeHtml(item.title)} 상세 보기">
            <div class="recipe-art ${item.art}">
              <span class="recipe-plate">${item.plate}</span>
              <span class="recipe-accent a">${item.accents[0] ?? ""}</span>
              <span class="recipe-accent b">${item.accents[1] ?? ""}</span>
              <span class="recipe-accent c">${item.accents[2] ?? ""}</span>
              <div class="time-pill">${escapeHtml(item.time)}</div>
            </div>
            <div class="recipe-card-body">
              <div class="recipe-title-row">
                <div class="recipe-title">${escapeHtml(item.title)}</div>
                <div class="recipe-mini-meta">
                  <span class="recipe-mini-pill">${escapeHtml(item.difficulty)}</span>
                  <span class="recipe-mini-pill">${escapeHtml(item.time)}</span>
                </div>
              </div>
              <p class="recipe-reason">${escapeHtml(item.reason)}</p>
              <div class="recipe-group">
                <span class="recipe-group-label">부족한 재료</span>
                <div class="recipe-chip-wrap">${renderIngredientChips(item.missingIngredients, "missing", "추가 재료 없음")}</div>
              </div>
            </div>
          </button>
        `).join("");
      }

      function renderRecommendations() {
        if (recommendationState.status === "loading") {
          recipeGrid.innerHTML = renderFeedbackCard({
            title: "AI가 추천 메뉴를 분석하고 있어요",
            copy: "현재 재고와 유통기한을 바탕으로 가장 알맞은 메뉴를 찾는 중입니다.",
            loading: true
          });
          return;
        }

        if (recommendationState.status === "error") {
          recipeGrid.innerHTML = renderFeedbackCard({
            title: "추천 결과를 불러오지 못했어요",
            copy: recommendationState.error || "잠시 후 다시 시도해 주세요.",
            actionLabel: "다시 시도",
            action: "retry"
          });
          return;
        }

        if (recommendationState.status === "empty") {
          recipeGrid.innerHTML = renderFeedbackCard({
            title: "추천할 메뉴가 아직 없어요",
            copy: "재고를 더 추가하거나, 조합 가능한 식재료를 늘리면 AI 추천이 다시 생성됩니다."
          });
          return;
        }

        if (recommendationState.status === "success") {
          recipeGrid.innerHTML = renderRecommendationCards(recommendationState.items);
          return;
        }

        recipeGrid.innerHTML = "";
      }

      async function loadRecommendations() {
        recommendationState.status = "loading";
        recommendationState.error = "";
        renderRecommendations();

        try {
          recipeDetailState.cache.clear();
          await wait(520);
          const nextItems = generateRecommendations(stocks);
          recommendationState.items = nextItems;
          recommendationState.status = nextItems.length ? "success" : "empty";
        } catch (error) {
          recommendationState.items = [];
          recommendationState.status = "error";
          recommendationState.error = "AI 추천을 가져오지 못했어요. 잠시 후 다시 시도해 주세요.";
        }

        renderRecommendations();
      }

      function createRecipeDetail(recommendation) {
        const template = recipeTemplates.find((item) => item.id === recommendation.id);

        if (!template) {
          return null;
        }

        return {
          title: recommendation.title,
          reason: recommendation.reason,
          availableIngredients: recommendation.availableIngredients,
          missingIngredients: recommendation.missingIngredients,
          cookTime: recommendation.time,
          difficulty: recommendation.difficulty,
          steps: template.buildSteps(recommendation),
          expiryUse: recommendation.useSoonMessage
        };
      }

      async function fetchRecipeDetail(recipeId) {
        if (recipeDetailState.cache.has(recipeId)) {
          return recipeDetailState.cache.get(recipeId);
        }

        await wait(360);
        const recommendation = recommendationState.items.find((item) => item.id === recipeId);

        if (!recommendation) {
          return null;
        }

        const detail = createRecipeDetail(recommendation);

        if (!detail) {
          return null;
        }

        recipeDetailState.cache.set(recipeId, detail);
        return detail;
      }

      function setRecipeDetailOpen(open) {
        recipeDetailSheet.classList.toggle("open", open);
        recipeDetailSheet.setAttribute("aria-hidden", String(!open));
      }

      function closeRecipeDetail() {
        setRecipeDetailOpen(false);
        recipeDetailState.status = "idle";
        recipeDetailState.data = null;
        recipeDetailState.error = "";
        recipeDetailState.activeId = null;
        detailTitle.textContent = "레시피 상세";
        detailBody.innerHTML = "";
      }

      function renderRecipeDetail() {
        if (recipeDetailState.status === "loading") {
          detailBody.innerHTML = renderFeedbackCard({
            title: "레시피 상세를 준비하고 있어요",
            copy: "이미 받은 AI 추천을 바탕으로 조리 순서를 정리하는 중입니다.",
            loading: true
          });
          return;
        }

        if (recipeDetailState.status === "error") {
          detailBody.innerHTML = renderFeedbackCard({
            title: "레시피 상세를 불러오지 못했어요",
            copy: recipeDetailState.error || "잠시 후 다시 시도해 주세요.",
            actionLabel: "다시 불러오기",
            action: "retry-detail"
          });
          return;
        }

        if (recipeDetailState.status === "empty" || !recipeDetailState.data) {
          detailBody.innerHTML = renderFeedbackCard({
            title: "상세 정보가 아직 없어요",
            copy: "선택한 메뉴의 상세 레시피를 아직 만들지 못했습니다."
          });
          return;
        }

        const detail = recipeDetailState.data;
        detailTitle.textContent = detail.title;
        detailBody.innerHTML = `
          <section class="detail-section">
            <h3>추천 이유</h3>
            <p class="detail-copy">${escapeHtml(detail.reason)}</p>
            <div class="detail-meta-row">
              <span class="detail-meta-pill">조리 시간 ${escapeHtml(detail.cookTime)}</span>
              <span class="detail-meta-pill">난이도 ${escapeHtml(detail.difficulty)}</span>
            </div>
          </section>
          <section class="detail-section">
            <h3>사용 재료</h3>
            <div class="detail-chip-list">${renderIngredientChips(detail.availableIngredients, "available", "현재 재고 없음")}</div>
          </section>
          <section class="detail-section">
            <h3>부족한 재료</h3>
            <div class="detail-chip-list">${renderIngredientChips(detail.missingIngredients, "missing", "추가 재료 없음")}</div>
          </section>
          <section class="detail-section">
            <h3>유통기한 임박 재료 활용</h3>
            <p class="detail-copy">${escapeHtml(detail.expiryUse)}</p>
          </section>
          <section class="detail-section">
            <h3>조리 순서</h3>
            <ol class="detail-step-list">
              ${detail.steps.map((step) => `<li>${escapeHtml(step)}</li>`).join("")}
            </ol>
          </section>
        `;
      }

      async function openRecipeDetail(recipeId) {
        const recommendation = recommendationState.items.find((item) => item.id === recipeId);

        recipeDetailState.activeId = recipeId;
        recipeDetailState.data = null;
        recipeDetailState.error = "";
        recipeDetailState.status = "loading";
        detailTitle.textContent = recommendation ? recommendation.title : "레시피 상세";
        setRecipeDetailOpen(true);
        renderRecipeDetail();

        try {
          const detail = await fetchRecipeDetail(recipeId);

          if (recipeDetailState.activeId !== recipeId) {
            return;
          }

          recipeDetailState.status = detail ? "success" : "empty";
          recipeDetailState.data = detail;
        } catch (error) {
          if (recipeDetailState.activeId !== recipeId) {
            return;
          }

          recipeDetailState.status = "error";
          recipeDetailState.error = "레시피 상세를 생성하지 못했어요. 잠시 후 다시 시도해 주세요.";
        }

        renderRecipeDetail();
      }

      function syncStorageTabs() {
        storageFilters.forEach((filter) => {
          const isActive = filter.dataset.storage === activeStorage;
          filter.classList.toggle("active", isActive);
          filter.setAttribute("aria-pressed", String(isActive));
        });
      }

      function syncBottomTabs() {
        tabs.forEach((tab) => {
          tab.classList.toggle("active", tab.dataset.tab === activeTab);
        });
      }

      function setActiveStorage(nextStorage) {
        if (!storageLabels[nextStorage]) return;
        activeStorage = nextStorage;
        syncStorageTabs();
        renderStocks();
      }

      function setActiveTab(nextTab) {
        activeTab = nextTab;
        const isStockView = activeTab === "stock";
        const isCookView = activeTab === "cook";

        syncBottomTabs();
        storageTabs.hidden = !isStockView;
        storageTabs.setAttribute("aria-hidden", String(!isStockView));
        stockGrid.hidden = isCookView;
        recipeSectionHead.hidden = !isCookView;
        recipeGrid.hidden = !isCookView;
        renderStocks();
      }

      syncStorageTabs();
      setActiveTab(activeTab);
      loadRecommendations();

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          setActiveTab(tab.dataset.tab);
        });
      });

      storageFilters.forEach((filter) => {
        filter.addEventListener("click", () => {
          setActiveStorage(filter.dataset.storage);
        });
      });

      recipeRefreshButton.addEventListener("click", () => {
        loadRecommendations();
      });

      recipeGrid.addEventListener("click", (event) => {
        const actionButton = event.target.closest("[data-recipe-action]");

        if (actionButton) {
          if (actionButton.dataset.recipeAction === "retry") {
            loadRecommendations();
          }
          return;
        }

        const card = event.target.closest("[data-recipe-id]");

        if (card) {
          openRecipeDetail(card.dataset.recipeId);
        }
      });

      detailBody.addEventListener("click", (event) => {
        const actionButton = event.target.closest("[data-recipe-action]");

        if (actionButton && actionButton.dataset.recipeAction === "retry-detail" && recipeDetailState.activeId) {
          openRecipeDetail(recipeDetailState.activeId);
        }
      });

      detailBackdrop.addEventListener("click", closeRecipeDetail);
      detailClose.addEventListener("click", closeRecipeDetail);

      function setSheet(open) {
        quickSheet.classList.toggle("open", open);
        quickSheet.setAttribute("aria-hidden", String(!open));
      }

      fab.addEventListener("click", () => setSheet(true));
      sheetBackdrop.addEventListener("click", () => setSheet(false));
      document.addEventListener("keydown", (event) => {
        if (event.key !== "Escape") return;
        if (recipeDetailSheet.classList.contains("open")) {
          closeRecipeDetail();
          return;
        }
        setSheet(false);
      });
    </script>
  </body>
</html>
